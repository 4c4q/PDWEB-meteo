<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vremea Globală Live</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ Vremea Globală</h1>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Caută un oraș...">
            <button class="search-btn" onclick="searchCity()">Caută</button>
        </div>

        <div class="city-buttons">
            <button class="city-btn active" onclick="selectCity('București')">București</button>
            <button class="city-btn" onclick="selectCity('Cluj-Napoca')">Cluj-Napoca</button>
            <button class="city-btn" onclick="selectCity('Iași')">Iași</button>
            <button class="city-btn" onclick="selectCity('Paris')">Paris</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="glass-card">
            <div class="weather-main">
                <div>
                    <h2 class="city-name" id="cityName">Se încarcă...</h2>
                    <span id="lastUpdated"></span>
                    <div class="temperature" id="temperature">--°C</div>
                    <div class="condition" id="condition">Vă rugăm așteptați...</div>
                </div>
                <div class="weather-icon" id="weatherIcon">⏳</div>
            </div>
        </div>

        <div class="glass-card">
            <div class="details-grid">
                <div class="detail-item"><div>💧 Umiditate</div><div id="humidity">--%</div></div>
                <div class="detail-item"><div>💨 Vânt</div><div id="wind">-- km/h</div></div>
                <div class="detail-item"><div>🌡️ Resimțită</div><div id="feelsLike">--°C</div></div>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="forecast-title">📅 Prognoza pe 5 zile</h3>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>
    </div>
    
    <script src="assets/js/weather.js"></script>
</body>
</html>
