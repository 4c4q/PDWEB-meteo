<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vremea Globală Pro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/weather.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>🌤️ Vremea Globală</h1>
        
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Caută un oraș (ex: Iași, Londra)...">
            <button class="search-btn">Caută</button>
            <button class="gps-btn" title="Locație automată">📍</button>
        </div>

        <div class="city-buttons">
            <button class="city-btn active">București</button>
            <button class="city-btn">Iași</button>
            <button class="city-btn">Cluj-Napoca</button>
            <button class="city-btn">Londra</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="glass-card main-weather-card">
            <div class="weather-main">
                <div class="main-info">
                    <h2 class="city-name" id="cityName">Se încarcă...</h2>
                    <span id="lastUpdated"></span>
                    <div class="temperature" id="temperature">--°C</div>
                    <div class="condition" id="condition">Vă rugăm așteptați...</div>
                </div>
                <div class="weather-icon" id="weatherIcon">⏳</div>
            </div>
        </div>

        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-icon">💧</span>
                <div class="detail-info">
                    <span class="detail-label">Umiditate</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
            </div>
            <div class="detail-item">
                <span class="detail-icon">💨</span>
                <div class="detail-info">
                    <span class="detail-label">Vânt</span>
                    <span class="detail-value" id="wind">-- km/h</span>
                </div>
            </div>
            <div class="detail-item">
                <span class="detail-icon">👁️</span>
                <div class="detail-info">
                    <span class="detail-label">Vizibilitate</span>
                    <span class="detail-value" id="visibility">-- km</span>
                </div>
            </div>
            <div class="detail-item">
                <span class="detail-icon">🌡️</span>
                <div class="detail-info">
                    <span class="detail-label">Senzație</span>
                    <span class="detail-value" id="feelsLike">--°C</span>
                </div>
            </div>
        </div>

        <div class="glass-card forecast-container">
            <h3 class="forecast-title">📅 Prognoza pe 5 zile</h3>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>

        <div class="glass-card map-container">
            <h3 class="forecast-title">🗺️ Locație oraș</h3>
            <div id="map"></div>
        </div>

    </div>
</body>
</html>
